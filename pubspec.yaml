name: uas_mobile_lanjut
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter
  
  # UI & Routing
  cupertino_icons: ^1.0.8
  go_router: ^17.3.0
  lottie: ^3.3.3
  
  # State Management & Architecture
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  
  # Networking & Utilities
  dio: ^5.9.2
  logger: ^2.7.0
  
  # Local Database & Storage
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.6
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  
  # Code Generators
  build_runner: ^2.4.13
  isar_generator: ^3.1.0+1
  
  # Testing
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
  assets:
    - assets/lottie/
    - assets/images/